name: Update Boxing Calendar

on:
  schedule:
    # This triggers the script every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # This allows you to manually run the script whenever you want

permissions:
  contents: write # Allows GitHub to save the updated .ics file back to your repo

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scraper3.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add upcoming_fights.ics
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update calendar data [skip ci]" && git push)
